name: Motov CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Client - Lint
        run: npm run lint --prefix client

      - name: Client - Build
        run: npm run build --prefix client

      - name: Mobile - Type check
        run: npx tsc --noEmit --project mobile/tsconfig.json

      - name: Server - Build (Compile check)
        run: npm run build --prefix server

      - name: Server - Run tests
        env:
          JWT_SECRET: ci-test-jwt-secret-key-placeholder
          REFRESH_TOKEN_SECRET: ci-test-refresh-token-secret-key-placeholder
          MONGODB_URI: mongodb://localhost:27017/Motov_ci_test
          VNP_TMNCODE: ci-test-vnpay-tmncode-placeholder
          VNP_HASHSECRET: ci-test-vnpay-hashsecret-placeholder
          VNP_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
          VNP_RETURNURL: http://localhost:3000/vnpay-return
        run: npm run test --prefix server
